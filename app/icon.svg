<svg width="64" height="64" viewBox="0 0 64 64" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background with gradient -->
  <rect width="64" height="64" rx="12" fill="url(#bg-gradient)"/>
  
  <!-- Glowing effect -->
  <rect width="64" height="64" rx="12" fill="url(#glow-gradient)" opacity="0.3"/>
  
  <!-- Border -->
  <rect x="2" y="2" width="60" height="60" rx="10" stroke="url(#border-gradient)" stroke-width="2" fill="none"/>
  
  <!-- Letter R with techno style -->
  <path d="M18 16 L18 48 M18 16 L32 16 C37 16 40 19 40 24 C40 29 37 32 32 32 L18 32 M32 32 L42 48" 
        stroke="#00F3FF" 
        stroke-width="4" 
        stroke-linecap="round" 
        stroke-linejoin="round"
        fill="none"/>
  
  <!-- Accent dots for tech feel -->
  <circle cx="44" cy="20" r="2" fill="#00F3FF" opacity="0.6"/>
  <circle cx="48" cy="24" r="1.5" fill="#00F3FF" opacity="0.4"/>
  <circle cx="20" cy="44" r="1.5" fill="#00F3FF" opacity="0.4"/>
  
  <!-- Scanline effect -->
  <line x1="0" y1="32" x2="64" y2="32" stroke="#00F3FF" stroke-width="0.5" opacity="0.2"/>
  
  <!-- Gradients -->
  <defs>
    <linearGradient id="bg-gradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#0a0a0a"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    
    <radialGradient id="glow-gradient" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#00F3FF" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#00F3FF" stop-opacity="0"/>
    </radialGradient>
    
    <linearGradient id="border-gradient" x1="0" y1="0" x2="64" y2="64">
      <stop offset="0%" stop-color="#00F3FF"/>
      <stop offset="50%" stop-color="#0066FF"/>
      <stop offset="100%" stop-color="#00F3FF"/>
    </linearGradient>
  </defs>
</svg>
